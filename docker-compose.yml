services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: softline_db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql
      - ./database/01_CreateDatabase.sql:/scripts/01_init.sql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - softline_net

  backend:
    build:
      context: ./backend/SoftLineTeste.Api
      dockerfile: Dockerfile
    container_name: softline_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      JWT_KEY: ${JWT_KEY}
      DB_CONNECTION_STRING: Server=db;Database=SoftLineTeste;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - softline_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: softline_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - softline_net

volumes:
  db_data:

networks:
  softline_net:
    driver: bridge
